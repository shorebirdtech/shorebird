name: shorebird_code_push_protocol
description: Library which contains common interfaces used by Shorebird CodePush
version: 0.1.0+1
repository: https://github.com/shorebirdtech/shorebird
resolution: workspace

publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  collection: ^1.19.1
  meta: ^1.18.3

dev_dependencies:
  mocktail: ^1.0.5
  # Only used by `tool/gen.dart` to regenerate lib/src/ from the OpenAPI
  # spec.
  #
  # >=1.4.0 required: from that release the generator empties the
  # directory it is pointed at before generating, which for this package
  # would delete `lib/extensions/`, `lib/shorebird_code_push_protocol.dart`,
  # `test/src/`, this pubspec and the README — everything here that is
  # not generated. `tool/gen.dart` passes `--no-clear` to opt out; that
  # flag first exists in 1.4.0.
  space_gen: ^1.4.0
  test: ^1.31.2
